<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akses Trading ZYY - Saham</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
:root{
  --bg:#121212;
  --biru-kotak:#162A46;
  --biru-terang:#3B82F6;
  --hijau:#22C55E;
  --merah:#EF4444;
  --teks:#FFFFFF;
  --abu:#94A3B8;
}
body{background:var(--bg);color:var(--teks);padding-bottom:90px;}

/* Header Atas */
.header-atas{display:flex;align-items:center;gap:1rem;padding:1rem;}
.cari{flex:1;background:var(--biru-kotak);border-radius:12px;padding:.8rem 1rem;color:var(--teks);border:none;display:flex;align-items:center;gap:.5rem;}
.ikon{font-size:1.4rem;padding:.5rem;}

/* Kotak Saldo */
.kotak-saldo{background:var(--biru-kotak);margin:0 1rem 1.5rem;border-radius:12px;padding:1.2rem;display:flex;justify-content:space-between;align-items:center;}
.teks-saldo p{font-size:.9rem;color:var(--abu);margin-bottom:.3rem;}
.total-uang{font-size:1.5rem;font-weight:bold;}
.ubah{color:var(--merah);font-size:.9rem;margin-left:.5rem;}
.daya-beli{font-size:.9rem;color:var(--abu);margin-top:.5rem;}
.btn-deposit{background:var(--biru-terang);color:white;border:none;padding:.5rem 1rem;border-radius:8px;font-weight:bold;font-size:.95rem;display:flex;align-items:center;gap:.3rem;cursor:pointer;}

/* Tab Menu Atas */
.tab-atas{display:flex;gap:2rem;padding:0 1rem 1rem;overflow-x:auto;}
.tab-item{color:var(--abu);padding:.5rem 0;white-space:nowrap;cursor:pointer;}
.tab-item.aktif{color:var(--teks);border-bottom:2px solid var(--biru-terang);font-weight:bold;}

/* IHSG & Waktu */
.ihsg{padding:0 1rem 1rem;}
.judul-ihsg{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;}
.angka-ihsg{font-size:1.5rem;font-weight:bold;}
.kenaikan{color:var(--hijau);font-size:1rem;}
.pilihan-waktu{display:flex;gap:.5rem;margin-bottom:1rem;}
.btn-waktu{padding:.5rem 1rem;border-radius:6px;border:none;background:transparent;color:var(--abu);cursor:pointer;}
.btn-waktu.aktif{background:var(--biru-terang);color:white;}

/* Grafik (UKURAN DIPASANG PAS) */
.wadah-grafik{background:var(--biru-kotak);border-radius:12px;padding:1rem;margin:0 1rem;}
.info-grafik{text-align:center;font-size:.9rem;color:var(--abu);margin-bottom:.5rem;}
#grafikIHSG{height:240px !important;width:100% !important;}

/* Form Transaksi */
.form-transaksi{margin:1.5rem 1rem;background:var(--biru-kotak);border-radius:12px;padding:1.2rem;}
.judul-form{font-weight:bold;margin-bottom:1rem;}
.input{width:100%;padding:.8rem;border-radius:8px;border:1px solid #334155;background:var(--bg);color:var(--teks);margin-bottom:1rem;font-size:1rem;}
.tombol-biru{width:100%;padding:.9rem;border-radius:8px;border:none;background:var(--biru-terang);color:white;font-weight:bold;cursor:pointer;margin-bottom:.7rem;}
.tombol-hijau{width:100%;padding:.9rem;border-radius:8px;border:none;background:var(--hijau);color:white;font-weight:bold;cursor:pointer;}
.pesan{margin-top:1rem;font-size:.9rem;}

/* Nav Bawah */
.nav-bawah{position:fixed;bottom:0;left:0;right:0;background:var(--biru-kotak);display:flex;justify-content:space-around;padding:.8rem 0;border-top:1px solid #334155;}
.nav-item{text-align:center;color:var(--abu);font-size:.75rem;cursor:pointer;}
.nav-item.aktif{color:var(--biru-terang);font-weight:bold;}
.nav-item span{display:block;font-size:1.3rem;margin-bottom:.2rem;}
</style>
</head>
<body>

<!-- Header Atas -->
<div class="header-atas">
  <div class="cari">
    <span>📊</span>
    <span>Saham</span>
    <span style="margin-left:auto;">🔍</span>
  </div>
  <div class="ikon">🔔</div>
  <div class="ikon">☰</div>
</div>

<!-- Kotak Saldo -->
<div class="kotak-saldo">
  <div class="teks-saldo">
    <p>Total Saham 👁️</p>
    <div class="total-uang">Rp686 <span class="ubah">-Rp64 (-8,53%)</span></div>
    <div class="daya-beli">Daya Beli: <span id="txtDayaBeli">Rp0</span></div>
  </div>
  <button class="btn-deposit">+ Deposit</button>
</div>

<!-- Tab Menu -->
<div class="tab-atas">
  <div class="tab-item aktif">Jelajahi</div>
  <div class="tab-item">Watchlist</div>
  <div class="tab-item">Aset</div>
  <div class="tab-item">Day Trading</div>
  <div class="tab-item">Order</div>
</div>

<!-- IHSG -->
<div class="ihsg">
  <div class="judul-ihsg">
    <h2>IHSG</h2>
    <div class="angka-ihsg">5.772,33</div>
    <div class="kenaikan">▲ 77,21 (+1,36%)</div>
  </div>
  <div class="pilihan-waktu">
    <button class="btn-waktu">1D</button>
    <button class="btn-waktu">1W</button>
    <button class="btn-waktu aktif">1M</button>
    <button class="btn-waktu">3M</button>
    <button class="btn-waktu">1Y</button>
    <button class="btn-waktu">5Y</button>
    <button class="btn-waktu">ALL</button>
  </div>
</div>

<!-- Grafik -->
<div class="wadah-grafik">
  <div class="info-grafik">H: 5806 &nbsp;&nbsp;|&nbsp;&nbsp; L: 5706</div>
  <canvas id="grafikIHSG"></canvas>
</div>

<!-- Form Transaksi -->
<div class="form-transaksi">
  <div class="judul-form">Lakukan Transaksi</div>

  <!-- Deposit -->
  <input type="number" id="inputDeposit" class="input" placeholder="Masukkan jumlah deposit (contoh: 100000)">
  <button class="tombol-biru" onclick="tambahSaldo()">Tambah Saldo</button>

  <hr style="border-color:#334155;margin:1rem 0;">

  <!-- Beli Saham -->
  <input type="text" id="kodeSaham" class="input" value="TLKM" placeholder="Kode Saham">
  <input type="number" id="hargaSaham" class="input" value="3820" placeholder="Harga per lembar">
  <input type="number" id="jumlahLembar" class="input" value="100" placeholder="Jumlah lembar (min 100)">
  <button class="tombol-hijau" onclick="beliSaham()">Beli Saham</button>

  <div class="pesan" id="pesan"></div>
</div>

<!-- Nav Bawah -->
<div class="nav-bawah">
  <div class="nav-item"><span>🏠</span>Beranda</div>
  <div class="nav-item aktif"><span>🔭</span>Investasi</div>
  <div class="nav-item"><span>₿</span>Kripto</div>
  <div class="nav-item"><span>🏛️</span>Obligasi</div>
  <div class="nav-item"><span>📈</span>Portofolio</div>
</div>

<script>
let saldo = 0;

// Grafik dengan ukuran yang pas
const ctx = document.getElementById('grafikIHSG').getContext('2d');
new Chart(ctx, {
  type: 'line',
  data: {
    labels: ['09:30', '10:00', '10:30', '11:00', '11:30'],
    datasets: [{
      label: 'IHSG',
      data: [5710, 5760, 5790, 5770, 5772],
      borderColor: '#22C55E',
      backgroundColor: 'rgba(34,197,94,0.15)',
      fill: true,
      tension: 0.4,
      pointRadius: 0
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: true, // KUNCI: agar grafik tidak melar
    aspectRatio: 16/9, // Rasio lebar : tinggi pas
    plugins: {legend:{display:false}},
    scales: {
      x:{grid:{display:false},ticks:{color:'#94A3B8'}},
      y:{grid:{color:'#334155'},ticks:{color:'#94A3B8'}}
    }
  }
});

// Fungsi Deposit
function tambahSaldo(){
  const jumlah = parseInt(document.getElementById('inputDeposit').value);
  const pesan = document.getElementById('pesan');
  if(isNaN(jumlah) || jumlah <= 0){
    pesan.innerHTML = "⚠️ Masukkan jumlah yang benar!";
    pesan.style.color = '#EF4444';
    return;
  }
  saldo += jumlah;
  document.getElementById('txtDayaBeli').textContent = "Rp" + saldo.toLocaleString('id-ID');
  pesan.innerHTML = "✅ Berhasil deposit Rp" + jumlah.toLocaleString('id-ID');
  pesan.style.color = '#22C55E';
  document.getElementById('inputDeposit').value = "";
}

// Fungsi Beli Saham
function beliSaham(){
  const kode = document.getElementById('kodeSaham').value;
  const harga = parseInt(document.getElementById('hargaSaham').value);
  const jumlah = parseInt(document.getElementById('jumlahLembar').value);
  const total = harga * jumlah;
  const pesan = document.getElementById('pesan');
  if(!kode || isNaN(harga) || harga <=0 || isNaN(jumlah) || jumlah < 100){
    pesan.innerHTML = "⚠️ Isi data benar! Minimal 100 lembar.";
    pesan.style.color = '#EF4444';
    return;
  }
  if(total > saldo){
    pesan.innerHTML = "⚠️ Saldo kurang! Butuh Rp" + total.toLocaleString('id-ID');
    pesan.style.color = '#EF4444';
    return;
  }
  saldo -= total;
  document.getElementById('txtDayaBeli').textContent = "Rp" + saldo.toLocaleString('id-ID');
  pesan.innerHTML = "✅ Berhasil beli " + jumlah + " lembar " + kode;
  pesan.style.color = '#22C55E';
}

// Tombol Tab
document.querySelectorAll('.btn-waktu').forEach(b => b.onclick = function(){
  document.querySelectorAll('.btn-waktu').forEach(x => x.classList.remove('aktif'));
  this.classList.add('aktif');
});
document.querySelectorAll('.tab-item').forEach(t => t.onclick = function(){
  document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('aktif'));
  this.classList.add('aktif');
});
</script>
</body>
</html>
