<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akses Trading ZYY - Grafik Candlestick</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
:root{--bg:#121212;--card:#1E1E1E;--hijau:#16A34A;--merah:#DC2626;--teks:#FFFFFF;--abu:#9CA3AF;}
body{background:var(--bg);color:var(--teks);padding-bottom:20px;}

/* Header Halaman */
.header{padding:1rem;display:flex;align-items:center;gap:1rem;}
.kembali{font-size:1.5rem;cursor:pointer;padding:.5rem;}
.judul{flex:1;}
.judul h1{font-size:1.3rem;}
.judul p{font-size:.9rem;color:var(--abu);}
.ikon{font-size:1.3rem;padding:.5rem;}

/* Info Harga */
.info-harga{padding:1rem;border-bottom:1px solid #333;}
.harga-utama{font-size:2rem;font-weight:bold;}
.harga-kecil{font-size:1rem;color:var(--abu);}
.persen-naik{color:var(--hijau);margin-left:.5rem;}
.data-24jam{display:flex;justify-content:space-between;margin-top:1rem;font-size:.85rem;color:var(--abu);flex-wrap:wrap;gap:.5rem;}

/* Waktu */
.waktu{display:flex;gap:1rem;padding:1rem;border-bottom:1px solid #333;overflow-x:auto;}
.tombol-waktu{padding:.5rem 1rem;border-radius:20px;border:none;background:transparent;color:var(--abu);cursor:pointer;white-space:nowrap;}
.tombol-waktu.aktif{background:#2563EB;color:white;}

/* Grafik Utama */
.wadah-grafik{width:100%;height:380px;background:var(--bg);}

/* Indikator & Tombol */
.indikator{display:flex;gap:1rem;padding:1rem;border-bottom:1px solid #333;overflow-x:auto;}
.tombol-indikator{padding:.5rem 1rem;border-radius:4px;border:none;background:transparent;color:var(--abu);cursor:pointer;white-space:nowrap;}
.tombol-indikator.aktif{background:#374151;color:white;}

/* Pesanan & Tombol */
.pesanan{padding:1rem;}
.judul-pesanan{display:flex;gap:1rem;margin-bottom:1rem;}
.tab-pesanan{color:var(--abu);cursor:pointer;}
.tab-pesanan.aktif{color:var(--teks);font-weight:bold;}
.tombol-beli-jual{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem;}
.btn-beli{background:var(--hijau);color:white;padding:1rem;border-radius:8px;border:none;font-weight:bold;font-size:1.1rem;}
.btn-jual{background:var(--merah);color:white;padding:1rem;border-radius:8px;border:none;font-weight:bold;font-size:1.1rem;}
</style>
</head>
<body>

<!-- Header (Sudah Bisa Klik Kembali) -->
<div class="header">
  <div class="kembali" onclick="location.href='https://zii4you.github.io/Akses-treding-by-zyy/'">←</div>
  <div class="judul">
    <h1>BTC/IDR</h1>
  </div>
  <div class="ikon">⭐</div>
  <div class="ikon">⋮</div>
</div>

<!-- Info Harga -->
<div class="info-harga">
  <div class="harga-utama">1.093.074.829</div>
  <div class="harga-kecil">Rp1.093.074.829 <span class="persen-naik">+3,54%</span></div>
  <div class="data-24jam">
    <div>Tertinggi 24J: 1.101.068.000</div>
    <div>Terendah 24J: 1.050.509.830</div>
  </div>
</div>

<!-- Pilihan Waktu -->
<div class="waktu">
  <button class="tombol-waktu">15 Menit</button>
  <button class="tombol-waktu">1 Jam</button>
  <button class="tombol-waktu aktif">4 Jam</button>
  <button class="tombol-waktu">1 Hari</button>
  <button class="tombol-waktu">Lebih ▾</button>
</div>

<!-- Grafik Candlestick -->
<div class="wadah-grafik" id="grafik"></div>

<!-- Indikator -->
<div class="indikator">
  <button class="tombol-indikator">MA</button>
  <button class="tombol-indikator aktif">EMA</button>
  <button class="tombol-indikator">BOLL</button>
  <button class="tombol-indikator">VOL</button>
  <button class="tombol-indikator aktif">MACD</button>
  <button class="tombol-indikator">KDJ</button>
  <button class="tombol-indikator">RSI</button>
</div>

<!-- Pesanan -->
<div class="pesanan">
  <div class="judul-pesanan">
    <div class="tab-pesanan aktif">Pesanan</div>
    <div class="tab-pesanan">Riwayat</div>
  </div>
  <div class="tombol-beli-jual">
    <button class="btn-beli">Beli</button>
    <button class="btn-jual">Jual</button>
  </div>
</div>

<script>
// Buat Grafik Candlestick
const grafik = LightweightCharts.createChart(document.getElementById('grafik'), {
  layout: { background: { color: '#121212' }, textColor: '#9CA3AF' },
  grid: { vertLines: { color: '#1F1F1F' }, horzLines: { color: '#1F1F1F' } },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  rightPriceScale: { borderColor: '#333' },
  timeScale: { borderColor: '#333', timeVisible: true },
  width: document.getElementById('grafik').clientWidth,
  height: 380
});

// Tambah Data Lilin
const seriLilin = grafik.addCandlestickSeries({
  upColor: '#16A34A', downColor: '#DC2626',
  borderUpColor: '#16A34A', borderDownColor: '#DC2626',
  wickUpColor: '#16A34A', wickDownColor: '#DC2626'
});

seriLilin.setData([
  { time: '2026-06-18', open: 1080000000, high: 1085000000, low: 1078000000, close: 1082000000 },
  { time: '2026-06-19', open: 1082000000, high: 1095000000, low: 1081000000, close: 1092000000 },
  { time: '2026-06-20', open: 1092000000, high: 1094000000, low: 1065000000, close: 1070000000 },
  { time: '2026-06-21', open: 1070000000, high: 1075000000, low: 1062000000, close: 1068000000 },
  { time: '2026-06-22', open: 1068000000, high: 1080000000, low: 1067000000, close: 1078000000 },
  { time: '2026-06-23', open: 1078000000, high: 1090000000, low: 1075000000, close: 1085000000 },
  { time: '2026-06-24', open: 1085000000, high: 1088000000, low: 1040000000, close: 1050000000 },
  { time: '2026-06-25', open: 1050000000, high: 1070000000, low: 1035000000, close: 1065000000 },
  { time: '2026-06-26', open: 1065000000, high: 1095000000, low: 1060000000, close: 1093000000 }
]);

// Tambah Garis EMA
const seriEma7 = grafik.addLineSeries({ color: '#F7931A', lineWidth: 2 });
seriEma7.setData([
  { time: '2026-06-18', value: 1079000000 },
  { time: '2026-06-19', value: 1085000000 },
  { time: '2026-06-20', value: 1078000000 },
  { time: '2026-06-21', value: 1070000000 },
  { time: '2026-06-22', value: 1072000000 },
  { time: '2026-06-23', value: 1080000000 },
  { time: '2026-06-24', value: 1065000000 },
  { time: '2026-06-25', value: 1060000000 },
  { time: '2026-06-26', value: 1082000000 }
]);

window.addEventListener('resize', () => {
  grafik.applyOptions({ width: document.getElementById('grafik').clientWidth });
});
</script>
</body>
</html>
